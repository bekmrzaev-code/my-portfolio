<svg viewBox="0 0 592 332" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="qg" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#0F0F0F" stroke-width="0.5"/>
    </pattern>
    <filter id="lglow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lglowS">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="592" height="332" fill="#080808"/>
  <rect width="592" height="332" fill="url(#qg)"/>

  <!-- Header -->
  <rect width="592" height="34" fill="#0B0B0B"/>
  <line x1="0" y1="34" x2="592" y2="34" stroke="#AFEE00" stroke-width="0.5" stroke-opacity="0.4"/>
  <circle cx="15" cy="17" r="4.5" fill="#FF5F57"/>
  <circle cx="28" cy="17" r="4.5" fill="#FFBD2E"/>
  <circle cx="41" cy="17" r="4.5" fill="#27C93F"/>
  <text x="57" y="22" font-family="monospace" font-size="11" font-weight="bold" fill="#AFEE00">QUANTUM_SYNC</text>
  <text x="175" y="22" font-family="monospace" font-size="9" fill="#2A2A2A">v2.1.0 // distributed state protocol</text>
  <text x="510" y="22" font-family="monospace" font-size="9" fill="#AFEE00">● 9 NODES</text>

  <!-- Node graph area -->
  <rect x="8" y="42" width="380" height="258" fill="#060606" stroke="#141414" stroke-width="0.5"/>

  <!-- Connection lines (drawn first, below nodes) -->
  <!-- Central hub to all others -->
  <g stroke="#AFEE00" stroke-width="1" stroke-opacity="0.2" fill="none">
    <line x1="198" y1="171" x2="100" y2="100"/>
    <line x1="198" y1="171" x2="198" y2="80"/>
    <line x1="198" y1="171" x2="298" y2="100"/>
    <line x1="198" y1="171" x2="320" y2="171"/>
    <line x1="198" y1="171" x2="298" y2="242"/>
    <line x1="198" y1="171" x2="198" y2="262"/>
    <line x1="198" y1="171" x2="100" y2="242"/>
    <line x1="198" y1="171" x2="78" y2="171"/>
  </g>

  <!-- Active connections (brighter) -->
  <g stroke="#AFEE00" stroke-width="1.2" stroke-opacity="0.55" fill="none" filter="url(#lglowS)">
    <line x1="198" y1="171" x2="100" y2="100"/>
    <line x1="198" y1="171" x2="298" y2="100"/>
    <line x1="198" y1="171" x2="320" y2="171"/>
    <line x1="198" y1="171" x2="100" y2="242"/>
  </g>

  <!-- Data flow dots on active connections -->
  <circle cx="149" cy="135" r="2.5" fill="#AFEE00" opacity="0.9"/>
  <circle cx="248" cy="135" r="2.5" fill="#AFEE00" opacity="0.9"/>
  <circle cx="259" cy="171" r="2.5" fill="#AFEE00" opacity="0.9"/>
  <circle cx="149" cy="207" r="2.5" fill="#AFEE00" opacity="0.9"/>

  <!-- Outer ring nodes -->
  <g fill="#AFEE00" filter="url(#lglow)">
    <!-- Top left -->
    <circle cx="100" cy="100" r="10" fill="#0B0B0B" stroke="#AFEE00" stroke-width="1.5"/>
    <circle cx="100" cy="100" r="4" fill="#AFEE00" opacity="0.8"/>
    <!-- Top center -->
    <circle cx="198" cy="80" r="10" fill="#0B0B0B" stroke="#555" stroke-width="1"/>
    <circle cx="198" cy="80" r="4" fill="#555" opacity="0.6"/>
    <!-- Top right -->
    <circle cx="298" cy="100" r="10" fill="#0B0B0B" stroke="#AFEE00" stroke-width="1.5"/>
    <circle cx="298" cy="100" r="4" fill="#AFEE00" opacity="0.8"/>
    <!-- Middle right -->
    <circle cx="320" cy="171" r="10" fill="#0B0B0B" stroke="#AFEE00" stroke-width="1.5"/>
    <circle cx="320" cy="171" r="4" fill="#AFEE00" opacity="0.8"/>
    <!-- Bottom right -->
    <circle cx="298" cy="242" r="10" fill="#0B0B0B" stroke="#333" stroke-width="1"/>
    <circle cx="298" cy="242" r="4" fill="#333" opacity="0.5"/>
    <!-- Bottom center -->
    <circle cx="198" cy="262" r="10" fill="#0B0B0B" stroke="#555" stroke-width="1"/>
    <circle cx="198" cy="262" r="4" fill="#555" opacity="0.6"/>
    <!-- Bottom left -->
    <circle cx="100" cy="242" r="10" fill="#0B0B0B" stroke="#AFEE00" stroke-width="1.5"/>
    <circle cx="100" cy="242" r="4" fill="#AFEE00" opacity="0.8"/>
    <!-- Middle left -->
    <circle cx="78" cy="171" r="10" fill="#0B0B0B" stroke="#333" stroke-width="1"/>
    <circle cx="78" cy="171" r="4" fill="#333" opacity="0.5"/>
  </g>

  <!-- Central hub node -->
  <circle cx="198" cy="171" r="18" fill="#0B0B0B" stroke="#AFEE00" stroke-width="2" filter="url(#lglow)"/>
  <circle cx="198" cy="171" r="8" fill="#AFEE00" opacity="0.9"/>
  <circle cx="198" cy="171" r="14" fill="none" stroke="#AFEE00" stroke-width="0.5" opacity="0.3"/>

  <!-- Node labels -->
  <g font-family="monospace" font-size="7" fill="#3A3A3A" text-anchor="middle">
    <text x="100" y="92">N:0xA1</text>
    <text x="198" y="72">N:0xB2</text>
    <text x="298" y="92">N:0xC3</text>
    <text x="330" y="163">N:0xD4</text>
    <text x="298" y="260">N:0xE5</text>
    <text x="198" y="280">N:0xF6</text>
    <text x="100" y="260">N:0xA7</text>
    <text x="68" y="163">N:0xB8</text>
    <text x="198" y="163" fill="#1C1C1C">HUB</text>
  </g>

  <!-- Right panel -->
  <rect x="396" y="42" width="188" height="258" fill="#060606" stroke="#141414" stroke-width="0.5"/>

  <text x="402" y="58" font-family="monospace" font-size="8" fill="#444" letter-spacing="1">SYNC_STATUS</text>
  <line x1="396" y1="64" x2="584" y2="64" stroke="#141414" stroke-width="1"/>

  <!-- Node status list -->
  <g font-family="monospace" font-size="8">
    <text x="402" y="80"><tspan fill="#AFEE00">● </tspan><tspan fill="#777">N:0xA1  </tspan><tspan fill="#555">lat:2ms   synced</tspan></text>
    <text x="402" y="95"><tspan fill="#AFEE00">● </tspan><tspan fill="#777">N:0xC3  </tspan><tspan fill="#555">lat:4ms   synced</tspan></text>
    <text x="402" y="110"><tspan fill="#AFEE00">● </tspan><tspan fill="#777">N:0xD4  </tspan><tspan fill="#555">lat:3ms   synced</tspan></text>
    <text x="402" y="125"><tspan fill="#AFEE00">● </tspan><tspan fill="#777">N:0xA7  </tspan><tspan fill="#555">lat:5ms   synced</tspan></text>
    <text x="402" y="140"><tspan fill="#555">○ </tspan><tspan fill="#555">N:0xB2  </tspan><tspan fill="#333">lat:—     standby</tspan></text>
    <text x="402" y="155"><tspan fill="#555">○ </tspan><tspan fill="#555">N:0xF6  </tspan><tspan fill="#333">lat:—     standby</tspan></text>
    <text x="402" y="170"><tspan fill="#333">✕ </tspan><tspan fill="#333">N:0xE5  </tspan><tspan fill="#2A2A2A">lat:—     offline</tspan></text>
    <text x="402" y="185"><tspan fill="#333">✕ </tspan><tspan fill="#333">N:0xB8  </tspan><tspan fill="#2A2A2A">lat:—     offline</tspan></text>
  </g>

  <line x1="396" y1="196" x2="584" y2="196" stroke="#141414" stroke-width="1"/>
  <text x="402" y="212" font-family="monospace" font-size="8" fill="#444">THROUGHPUT</text>
  <text x="402" y="228" font-family="monospace" font-size="18" font-weight="bold" fill="#AFEE00">4.2</text>
  <text x="444" y="228" font-family="monospace" font-size="8" fill="#444">GB/s</text>
  <line x1="396" y1="238" x2="584" y2="238" stroke="#141414" stroke-width="1"/>
  <text x="402" y="254" font-family="monospace" font-size="8" fill="#444">CONSENSUS</text>
  <text x="402" y="270" font-family="monospace" font-size="9" fill="#AFEE00">RAFT  v2  epoch:142</text>
  <line x1="396" y1="280" x2="584" y2="280" stroke="#141414" stroke-width="1"/>
  <text x="402" y="293" font-family="monospace" font-size="8" fill="#AFEE00">● HEALTHY (4/9 active)</text>

  <!-- Bottom accent -->
  <rect x="0" y="330" width="592" height="2" fill="#AFEE00" opacity="0.4"/>
</svg>
