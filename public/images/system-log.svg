<svg viewBox="0 0 800 270" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="sgrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#131313" stroke-width="0.5"/>
    </pattern>
    <filter id="sglow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="270" fill="#080808"/>
  <rect width="800" height="270" fill="url(#sgrid)"/>

  <!-- Header -->
