<svg viewBox="0 0 592 332" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="ng" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#111" stroke-width="0.5"/>
    </pattern>
    <filter id="vglow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="aglow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="592" height="332" fill="#090909"/>
  <rect width="592" height="332" fill="url(#ng)"/>

  <!-- Header -->
  <rect width="592" height="34" fill="#0C0C0C"/>
  <line x1="0" y1="34" x2="592" y2="34" stroke="#C97CFF" stroke-width="0.5" stroke-opacity="0.5"/>
  <circle cx="15" cy="17" r="4.5" fill="#FF5F57"/>
  <circle cx="28" cy="17" r="4.5" fill="#FFBD2E"/>
  <circle cx="41" cy="17" r="4.5" fill="#27C93F"/>
  <text x="57" y="22" font-family="monospace" font-size="11" font-weight="bold" fill="#C97CFF" letter-spacing="0.3">NEURAL_DASHBOARD</text>
  <text x="218" y="22" font-family="monospace" font-size="9" fill="#2E2E2E">v2.4.1 // 4 channels</text>
  <circle cx="538" cy="17" r="3.5" fill="#AFEE00"/>
  <text x="547" y="21" font-family="monospace" font-size="9" fill="#AFEE00">RECORDING</text>

  <!-- Waveform area -->
  <rect x="8" y="42" width="446" height="228" fill="#060606" stroke="#1A1A1A" stroke-width="0.5"/>

  <!-- Channel separators -->
  <line x1="8" y1="99" x2="454" y2="99" stroke="#141414" stroke-width="1"/>
  <line x1="8" y1="156" x2="454" y2="156" stroke="#141414" stroke-width="1"/>
  <line x1="8" y1="213" x2="454" y2="213" stroke="#141414" stroke-width="1"/>

  <!-- Channel label column -->
  <rect x="8" y="42" width="30" height="228" fill="#070707"/>
  <line x1="38" y1="42" x2="38" y2="270" stroke="#141414" stroke-width="0.5"/>

  <g font-family="monospace" font-size="7" fill="#3A3A3A">
    <text x="12" y="58">CH1</text><text x="12" y="68">EEG</text>
    <text x="12" y="115">CH2</text><text x="12" y="125">ECG</text>
    <text x="12" y="172">CH3</text><text x="12" y="182">EMG</text>
    <text x="12" y="229">CH4</text><text x="12" y="239">RESP</text>
  </g>

  <!-- EEG — high-freq sine wave, violet -->
  <path d="M 42,70 Q 58,54 74,70 Q 90,86 106,70 Q 122,54 138,70 Q 154,86 170,70 Q 186,54 202,70 Q 218,86 234,70 Q 250,54 266,70 Q 282,86 298,70 Q 314,54 330,70 Q 346,86 362,70 Q 378,54 394,70 Q 410,86 426,70 Q 442,54 454,70"
    fill="none" stroke="#C97CFF" stroke-width="1.8" filter="url(#vglow)" opacity="0.95"/>

  <!-- ECG — heartbeat spikes, aqua -->
  <polyline points="42,127 60,127 63,124 65,127 68,104 70,150 72,127 96,127 99,124 101,127 104,104 106,150 108,127 132,127 135,124 137,127 140,104 142,150 144,127 168,127 171,124 173,127 176,104 178,150 180,127 204,127 207,124 209,127 212,104 214,150 216,127 240,127 243,124 245,127 248,104 250,150 252,127 276,127 279,124 281,127 284,104 286,150 288,127 312,127 315,124 317,127 320,104 322,150 324,127 348,127 351,124 353,127 356,104 358,150 360,127 384,127 387,124 389,127 392,104 394,150 396,127 420,127 423,124 425,127 428,104 430,150 432,127 454,127"
